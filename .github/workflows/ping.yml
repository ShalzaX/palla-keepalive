name: Render Keep-Alive Ping



on:
  schedule:
    - cron: '*/5 * * * *'  
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /health on palla-trade-bot
        run: |
          for i in 1 2 3; do
            if curl -sS --max-time 30 "https://palla-trade-bot.onrender.com/health" | grep -q alive; then
              echo "✅ ping attempt ${i} OK"
              exit 0
            fi
            echo "⚠️ attempt ${i} failed (or cold-starting), retry in 15s"
            sleep 15
          done
          echo "ℹ️ All attempts done — service may still be cold-starting"
